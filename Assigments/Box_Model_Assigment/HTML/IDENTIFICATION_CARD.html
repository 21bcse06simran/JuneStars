
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Assignment</title>
    <link rel="stylesheet" href="../CSS/IDENTIFICATION_CARD.css">
</head>
<body>

    <div class="id-card">
        <div class="card-header">
            IDENTIFICATION CARD
        </div>

        <div class="card-body">
            
            <div class="photo-container">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQThWbdrf4BMEAVQivcW_9h7BwiEIsGntE-sJdULEwD6w&s=10" alt="Profile Photo">            
            </div>

            <div class="details-container">
                
                <table class="info-table">
                    <tr>
                        <td class="label">Name:</td>
                        <td class="value name">JOHN DOE</td>
                    </tr>
                    <tr>
                        <td class="label">Title:</td>
                        <td class="value title">Director</td>
                    </tr>
                    <tr>
                        <td class="label">ID No:</td>
                        <td class="value">123456</td>
                    </tr>
                    <tr>
                        <td class="label">Issued:</td>
                        <td class="value">01/01/2020</td>
                    </tr>
                    <tr>
                        <td class="label">Expires:</td>
                        <td class="value">31/12/2020</td>
                    </tr>
                </table>

                <div class="company-logo">
                    COMPANY
                </div>

            </div>
        </div>
    </div>

</body>
</html>
