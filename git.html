    <!-- What is GIT:
     git is a VCS(version control system) used to track the changes in code
     
     What is github:
     github cloud platform(you can acess without downloading)  where you store git repo online
     (Folder - repositary and sub_folder - branches, path = directory)
     feature                          Git                       Github
     type                             software                  platform(website)
     works offline                    yes                       NO
     purpose                          track code changes        store & share the code

     git config --global user.name "Simran"
     git config --global user.email "simranmahapatra58@gmail.com"

     cd - change directory
     cd. ------ forward
     cd.. ----- backward

     git init ------ initialize the repocitory
     git add <flename.html>
        git add. - Add all files
        git commit -m "message"
        git remote add origin https://github.com/21bcse06simran/JuneStars.git
        git push -u origin master
        github repo -- Clone(git clone<-some link->) -- changes -- add -- commit -- push
        status of git
        A - Added(new file staged for commit)
        M - Modify (file content changed)
        U - Untracked (new files that git doesn't yet track)
        Staged = File is in the staging area after git add and ready for commit
        Unmodified = No changes since the last commit
        Working Directory → Staging Area → Local Repository → Remote Repository (GitHub)

        Commands:

        git add     → Working Directory → Staging Area
        git commit  → Staging Area → Local Repository
        git push    → Local Repository → GitHub
     -->
        
     <h1>This is first class of Git</h1>
