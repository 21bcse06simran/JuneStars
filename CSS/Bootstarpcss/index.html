<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstarp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 class="text-center text-primary p-4 pt-5 m-4 border border-primary">Hello bootstrap!!!</h1>
    <div class="d-flex justify-content-center">
        <button type="button" class="btn btn-primary">Primary</button>
    </div>
    <div class="container m-4">
        <div class="row d-flex gap-3"> <!-- It take 12 spaces or column for one row as step as per the column it adjust like if you take 3 column then for each column it take 4 space for each column if you want different size you can explicitily add col-12 means 12 space full row . If you want 5 space for first column then you can write col-5 -->
            <div class="col-12 bg-primary">
                Column 1
            </div>
            <div class="col bg-primary">
                Column 2
            </div>
            <div class="col bg-primary">
                Column 3
            </div>
        </div>
    </div>
</body>
</html>
